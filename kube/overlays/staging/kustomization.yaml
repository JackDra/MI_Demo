apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mi-demo-staging
resources:
  - namespace.yaml
  - ../../base
  - configmap.yaml
patches:
  - path: ingress-patch.yaml
images:
  - name: mi-demo-backend
    newName: ghcr.io/jackdra/mi-demo-backend
    newTag: staging
  - name: mi-demo-frontend
    newName: ghcr.io/jackdra/mi-demo-frontend
    newTag: staging
