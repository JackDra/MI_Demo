name: MI Demo Staging Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: mi-demo-staging-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/jackdra/mi-demo-backend
  FRONTEND_IMAGE: ghcr.io/jackdra/mi-demo-frontend
  KUBE_NAMESPACE: mi-demo-staging
  KUBE_OVERLAY: kube/overlays/staging

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:staging
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=mi-demo-backend
          cache-to: type=gha,mode=max,scope=mi-demo-backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:staging
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=mi-demo-frontend
          cache-to: type=gha,mode=max,scope=mi-demo-frontend

  deploy:
    name: Deploy to LKE staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://${{ vars.APP_URL || 'staging.mi.jackdra.com' }}
    permissions:
      contents: read

    env:
      APP_ENV: staging
      APP_URL: ${{ vars.APP_URL || 'staging.mi.jackdra.com' }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET || 'mi-demo-assets' }}
      PUBLIC_API_BASE_URL: ""
      SQL_ECHO: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for item in APP_URL KUBE_CONFIG GHCR_PULL_USERNAME GHCR_PULL_TOKEN DATABASE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SUPABASE_STORAGE_BUCKET; do
            if [ -z "${!item:-}" ]; then
              echo "Missing required secret or variable: $item"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Configure deployment overlay
        run: |
          set -euo pipefail
          kubectl apply -f "$KUBE_OVERLAY/namespace.yaml"
          kubectl create configmap mi-demo-config \
            --namespace "$KUBE_NAMESPACE" \
            --from-literal APP_ENV="$APP_ENV" \
            --from-literal PUBLIC_API_BASE_URL="$PUBLIC_API_BASE_URL" \
            --from-literal FRONTEND_ORIGINS="https://$APP_URL" \
            --from-literal SQL_ECHO="$SQL_ECHO" \
            --dry-run=client -o yaml > "$KUBE_OVERLAY/configmap.yaml"
          kubectl kustomize "$KUBE_OVERLAY" | \
            sed "s#ghcr.io/jackdra/mi-demo-backend:staging#${BACKEND_IMAGE}:${IMAGE_TAG}#g" | \
            sed "s#ghcr.io/jackdra/mi-demo-frontend:staging#${FRONTEND_IMAGE}:${IMAGE_TAG}#g" | \
            sed "s#staging.mi.jackdra.com#${APP_URL}#g" > /tmp/mi-demo-staging.yaml

      - name: Apply runtime secrets
        run: |
          set -euo pipefail
          kubectl apply -f "$KUBE_OVERLAY/configmap.yaml"

          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "$KUBE_NAMESPACE" \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic mi-demo-secrets \
            --namespace "$KUBE_NAMESPACE" \
            --from-literal APP_ENV="$APP_ENV" \
            --from-literal DATABASE_URL="$DATABASE_URL" \
            --from-literal SUPABASE_URL="$SUPABASE_URL" \
            --from-literal SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --from-literal SUPABASE_STORAGE_BUCKET="$SUPABASE_STORAGE_BUCKET" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run backend database migrations
        if: env.DATABASE_URL != ''
        run: |
          set -euo pipefail
          job_name="backend-db-migrate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${job_name}
            namespace: ${KUBE_NAMESPACE}
            labels:
              app.kubernetes.io/name: mi-demo
              app.kubernetes.io/component: backend-db-migrate
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 86400
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: mi-demo
                  app.kubernetes.io/component: backend-db-migrate
              spec:
                enableServiceLinks: false
                restartPolicy: Never
                imagePullSecrets:
                  - name: ghcr-pull-secret
                containers:
                  - name: backend-db-migrate
                    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
                    imagePullPolicy: IfNotPresent
                    command:
                      - sh
                      - -c
                      - alembic current && alembic upgrade head && alembic current
                    envFrom:
                      - secretRef:
                          name: mi-demo-secrets
                      - configMapRef:
                          name: mi-demo-config
          EOF

          if ! kubectl wait --for=condition=complete "job/${job_name}" --namespace "$KUBE_NAMESPACE" --timeout=300s; then
            kubectl describe "job/${job_name}" --namespace "$KUBE_NAMESPACE" || true
            kubectl logs "job/${job_name}" --namespace "$KUBE_NAMESPACE" --all-containers --prefix || true
            exit 1
          fi
          kubectl logs "job/${job_name}" --namespace "$KUBE_NAMESPACE" --all-containers --prefix

      - name: Apply Kubernetes manifests
        run: kubectl apply -f /tmp/mi-demo-staging.yaml

      - name: Wait for rollout
        run: |
          set -euo pipefail
          for component in backend frontend; do
            if ! kubectl rollout status "deployment/$component" --namespace "$KUBE_NAMESPACE" --timeout=300s; then
              kubectl describe "deployment/$component" --namespace "$KUBE_NAMESPACE" || true
              kubectl logs --namespace "$KUBE_NAMESPACE" \
                --selector "app.kubernetes.io/name=mi-demo,app.kubernetes.io/component=$component" \
                --all-containers --tail=200 --prefix || true
              exit 1
            fi
          done
          kubectl get ingress,certificate,pods --namespace "$KUBE_NAMESPACE"

      - name: Smoke checks
        run: |
          set -euo pipefail
          curl --fail --retry 6 --retry-all-errors --retry-delay 10 "https://$APP_URL/"
          curl --fail --retry 6 --retry-all-errors --retry-delay 10 "https://$APP_URL/healthz"
          curl --fail --retry 6 --retry-all-errors --retry-delay 10 "https://$APP_URL/readyz"
